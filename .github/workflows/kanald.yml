name: KanalD Scraper

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]
  schedule:
    - cron: '0 9 * * *' # Her gün Türkiye saatiyle öğlen gibi otomatik çalışır

jobs:
  build:
    runs-on: ubuntu-latest
    # Repoya dosya yükleyebilmek için yazma izni şart
    permissions:
      contents: write

    steps:
      - name: Repo'yu checkout et
        uses: actions/checkout@v4

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Paketleri yükle
        run: |
          pip install requests beautifulsoup4 cloudscraper

      - name: Scripti çalıştır
        run: python kanald.py

      - name: Değişiklikleri Repoya Yükle (Commit & Push)
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add kanald_library.html
          # Sadece dosya değişmişse commit yap, yoksa hata verme
          git diff --quiet && git diff --staged --quiet || (git commit -m "Güncel Kanal D İçerik Listesi: $(date)" && git push)
